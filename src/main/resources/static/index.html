<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookClub — 회원 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f0f11;
      --surface:   #18181c;
      --border:    #2a2a30;
      --accent:    #b5ff6d;
      --accent-dk: #8ed44f;
      --text:      #e8e8e0;
      --muted:     #72726a;
      --danger:    #ff6b6b;
      --radius:    10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    /* ── 왼쪽 패널 ── */
    .left {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      gap: 36px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--muted); font-size: 13px; font-family: 'DM Sans', sans-serif; display: block; margin-top: 2px; font-weight: 300; }

    .form-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }

    label { font-size: 12px; color: var(--muted); }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #111; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dk); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .msg {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .msg.ok  { background: #1a2e10; color: var(--accent); display: block; }
    .msg.err { background: #2e1010; color: var(--danger);  display: block; }

    /* API URL 설정 */
    .api-config {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .api-config label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; letter-spacing: .05em; }
    .api-config input { font-size: 12px; padding: 7px 10px; }

    /* ── 오른쪽 패널 ── */
    .right {
      padding: 48px 44px;
      overflow-y: auto;
    }

    .right-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .right-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
    }
    .count-badge {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 테이블 */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }
    td { padding: 14px 16px; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: #111;
      font-size: 11px;
      font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-email { font-size: 12px; color: var(--muted); }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 14px;
      display: none;
    }
    .empty.show { display: block; }

    /* 로딩 */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .spinner.on { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 반응형 */
    @media (max-width: 720px) {
      body { grid-template-columns: 1fr; }
      .left { position: static; height: auto; }
    }
  </style>
</head>
<body>

<!-- ── 왼쪽: 회원가입 폼 ── -->
<aside class="left">
  <div>
    <div class="logo">BookClub <span>Member Console</span></div>
  </div>

  <div>
    <p class="form-title">API 서버 설정</p>
    <div class="api-config">
      <label>BASE URL</label>
      <input type="text" id="apiBase" value="http://localhost:8080" placeholder="http://localhost:8080" />
    </div>
  </div>

  <div>
    <p class="form-title">회원 가입</p>

    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" placeholder="hello@example.com" />
    </div>
    <div class="field">
      <label for="password">비밀번호 (8자 이상)</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <div class="field">
      <label for="nickname">닉네임</label>
      <input type="text" id="nickname" placeholder="홍길동" />
    </div>

    <div id="signupMsg" class="msg"></div>

    <button class="btn btn-primary" id="signupBtn" onclick="signup()" style="margin-top:8px">
      가입하기
    </button>
  </div>
</aside>

<!-- ── 오른쪽: 회원 목록 ── -->
<main class="right">
  <div class="right-header">
    <div style="display:flex;align-items:center;gap:12px">
      <h2>회원 목록</h2>
      <span class="count-badge" id="countBadge">0명</span>
      <div class="spinner" id="spinner"></div>
    </div>
    <button class="refresh-btn" onclick="loadUsers()">
      ↺ 새로고침
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>회원</th>
          <th>이메일</th>
          <th>닉네임</th>
          <th>가입일</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
    <div class="empty" id="empty">아직 가입된 회원이 없습니다.</div>
  </div>
</main>

<script>
  function base() {
    return document.getElementById('apiBase').value.replace(/\/$/, '');
  }

  // ── 회원가입 ──────────────────────────────────────────────
  async function signup() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const nickname = document.getElementById('nickname').value.trim();
    const msg      = document.getElementById('signupMsg');
    const btn      = document.getElementById('signupBtn');

    msg.className = 'msg';
    msg.textContent = '';

    if (!email || !password || !nickname) {
      showMsg('err', '모든 항목을 입력해 주세요.');
      return;
    }
    if (password.length < 8) {
      showMsg('err', '비밀번호는 8자 이상이어야 합니다.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '처리 중…';

    try {
      const res = await fetch(`${base()}/api/v1/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, nickname })
      });

      if (res.ok) {
        showMsg('ok', '✓ 가입이 완료되었습니다!');
        document.getElementById('email').value    = '';
        document.getElementById('password').value = '';
        document.getElementById('nickname').value = '';
        loadUsers();
      } else {
        const err = await res.json().catch(() => ({}));
        showMsg('err', err.message || `오류 발생 (${res.status})`);
      }
    } catch (e) {
      showMsg('err', '서버에 연결할 수 없습니다. BASE URL을 확인해 주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '가입하기';
    }
  }

  function showMsg(type, text) {
    const el = document.getElementById('signupMsg');
    el.className = `msg ${type}`;
    el.textContent = text;
  }

  // ── 회원 목록 조회 ───────────────────────────────────────
  async function loadUsers() {
    const spinner = document.getElementById('spinner');
    const tbody   = document.getElementById('userTable');
    const empty   = document.getElementById('empty');
    const badge   = document.getElementById('countBadge');

    spinner.classList.add('on');
    tbody.innerHTML = '';
    empty.classList.remove('show');

    try {
      const res = await fetch(`${base()}/api/v1/users`);
      if (!res.ok) throw new Error(res.status);

      const users = await res.json();
      badge.textContent = `${users.length}명`;

      if (users.length === 0) {
        empty.classList.add('show');
      } else {
        users.forEach(u => {
          const initials = (u.nickname || u.email).slice(0, 2).toUpperCase();
          const date = u.createdAt
            ? new Date(u.createdAt).toLocaleDateString('ko-KR')
            : '-';
          tbody.insertAdjacentHTML('beforeend', `
            <tr>
              <td>
                <div class="user-cell">
                  <div class="avatar">${initials}</div>
                  <div>
                    <div>${u.nickname || '-'}</div>
                    <div class="user-email">${u.email}</div>
                  </div>
                </div>
              </td>
              <td>${u.email}</td>
              <td>${u.nickname || '-'}</td>
              <td>${date}</td>
            </tr>
          `);
        });
      }
    } catch (e) {
      empty.textContent = '목록을 불러오지 못했습니다. 서버를 확인해 주세요.';
      empty.classList.add('show');
    } finally {
      spinner.classList.remove('on');
    }
  }

  // 입력 필드에서 Enter 키 지원
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.matches('#email,#password,#nickname')) signup();
  });

  // 초기 로드
  loadUsers();
</script>
</body>
</html>
